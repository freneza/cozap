services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    volumes:
      - ..:/workspaces/coZap:cached
    command: sleep infinity
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATABASE_URL: postgresql://cozap:cozap@db:5432/cozap
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cozap
      POSTGRES_PASSWORD: cozap
      POSTGRES_DB: cozap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
